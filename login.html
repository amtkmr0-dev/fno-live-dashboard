<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quanta Terminal - Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:            #131722;
  --surface:       #1e222d;
  --border:        #2a2e39;
  --border-focus:  #2962ff;
  --text:          #d1d4dc;
  --text-dim:      #787b86;
  --text-bright:   #f0f2f5;
  --blue:          #2962ff;
  --blue-hover:    #1e53e4;
  --green:         #26a69a;
  --red:           #ef5350;
  --radius-md:     6px;
  --radius-lg:     10px;
  --radius-xl:     14px;
  --shadow-lg:     0 8px 24px rgba(0,0,0,0.5);
  --font-sans:     'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* Background grid pattern */
.bg-pattern {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(41,98,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(41,98,255,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  z-index: 0;
}

/* Subtle radial glow */
.bg-glow {
  position: fixed;
  top: 30%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(41,98,255,0.08) 0%, transparent 70%);
  z-index: 0;
  pointer-events: none;
}

.login-container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 400px;
  padding: 0 20px;
}

.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 36px 32px 32px;
  box-shadow: var(--shadow-lg);
}

/* Brand header */
.login-brand {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 32px;
}
.brand-logo {
  width: 48px;
  height: 48px;
  background: linear-gradient(135deg, var(--blue), #6366f1);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: 800;
  color: #fff;
  margin-bottom: 16px;
  box-shadow: 0 4px 16px rgba(41,98,255,0.3);
}
.brand-name {
  font-size: 22px;
  font-weight: 700;
  color: var(--text-bright);
  letter-spacing: 0.5px;
}
.brand-sub {
  font-size: 13px;
  color: var(--text-dim);
  margin-top: 4px;
}

/* Form */
.login-form { display: flex; flex-direction: column; gap: 16px; }

.field-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.field-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.field-input {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 10px 12px;
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  width: 100%;
}
.field-input:focus {
  border-color: var(--border-focus);
  box-shadow: 0 0 0 3px rgba(41,98,255,0.15);
}
.field-input::placeholder { color: var(--text-dim); opacity: 0.6; }

/* Remember me + forgot */
.form-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.remember-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text-dim);
  cursor: pointer;
}
.remember-label input[type="checkbox"] {
  width: 16px;
  height: 16px;
  accent-color: var(--blue);
  cursor: pointer;
}

/* Submit button */
.btn-login {
  width: 100%;
  padding: 11px;
  background: var(--blue);
  color: #fff;
  border: none;
  border-radius: var(--radius-md);
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  margin-top: 4px;
}
.btn-login:hover { background: var(--blue-hover); }
.btn-login:active { transform: scale(0.98); }
.btn-login:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

/* Error message */
.login-error {
  background: rgba(239,83,80,0.1);
  border: 1px solid rgba(239,83,80,0.2);
  border-radius: var(--radius-md);
  padding: 10px 14px;
  font-size: 13px;
  color: var(--red);
  display: none;
  align-items: center;
  gap: 8px;
}
.login-error.show { display: flex; }

/* Footer */
.login-footer {
  text-align: center;
  margin-top: 24px;
  font-size: 11px;
  color: var(--text-dim);
  opacity: 0.6;
}

/* Loading state on button */
.btn-login .spinner {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  vertical-align: middle;
  margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="bg-pattern"></div>
<div class="bg-glow"></div>

<div class="login-container">
  <div class="login-card">
    <div class="login-brand">
      <div class="brand-logo">Q</div>
      <div class="brand-name">Quanta Terminal</div>
      <div class="brand-sub">F&amp;O Analytics Platform</div>
    </div>

    <form class="login-form" id="loginForm" autocomplete="on">
      <div class="login-error" id="loginError">
        <span id="errorIcon">&#x26A0;</span>
        <span id="errorMsg">Invalid credentials</span>
      </div>

      <div class="field-group">
        <label class="field-label" for="username">Username</label>
        <input class="field-input" type="text" id="username" name="username"
               placeholder="Enter username" autocomplete="username" required>
      </div>

      <div class="field-group">
        <label class="field-label" for="password">Password</label>
        <input class="field-input" type="password" id="password" name="password"
               placeholder="Enter password" autocomplete="current-password" required>
      </div>

      <div class="form-row">
        <label class="remember-label">
          <input type="checkbox" id="rememberMe" checked>
          Remember me
        </label>
      </div>

      <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
    </form>

    <div class="login-footer">
      Quanta Terminal v1.0 &mdash; Secure Access
    </div>
  </div>
</div>

<script>
(function() {
  var form = document.getElementById('loginForm');
  var btn = document.getElementById('loginBtn');
  var errBox = document.getElementById('loginError');
  var errMsg = document.getElementById('errorMsg');

  // Check if already authenticated
  var token = localStorage.getItem('q_session');
  if (token) {
    // Verify token is still valid
    fetch('/api/auth/verify', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({token: token})
    }).then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.valid) window.location.href = '/';
      })
      .catch(function() {});
  }

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    var user = document.getElementById('username').value.trim();
    var pass = document.getElementById('password').value;
    var remember = document.getElementById('rememberMe').checked;

    if (!user || !pass) {
      showError('Please enter username and password');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Signing in...';
    errBox.classList.remove('show');

    fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username: user, password: pass})
    })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.success && d.token) {
        if (remember) {
          localStorage.setItem('q_session', d.token);
        } else {
          sessionStorage.setItem('q_session', d.token);
        }
        window.location.href = '/';
      } else {
        showError(d.error || 'Invalid credentials');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    })
    .catch(function(err) {
      showError('Connection failed. Check if server is running.');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    });
  });

  function showError(msg) {
    errMsg.textContent = msg;
    errBox.classList.add('show');
  }
})();
</script>
</body>
</html>
