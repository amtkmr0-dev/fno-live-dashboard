<?xml version="1.0" encoding="UTF-8"?>
<!--
  Quantra monogram v4 — gradient badge with a Q whose tail extends as an
  upward chart stroke. Resonates with a trading terminal: the tail IS
  the price-up signal. Gradient gives depth without skeuomorphism.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" aria-label="Quantra">
  <defs>
    <!-- Diagonal gradient: deeper blue top-left to cyan bottom-right.
         Reads as "moving up & right" subliminally. -->
    <linearGradient id="qg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1e3a8a"/>
      <stop offset="0.55" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <!-- Subtle inner highlight to give the badge a soft "lift" -->
    <linearGradient id="qhl" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Badge -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#qg)"/>
  <rect width="64" height="64" rx="14" ry="14" fill="url(#qhl)"/>
  <!-- Q ring — open at bottom-right where the tail exits as a chart stroke -->
  <path d="M 32 14
           A 14 14 0 1 1 21.5 41.5"
        fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
  <!-- Tail: an upward chart stroke exiting the ring (the "groove") -->
  <path d="M 31 35 L 42 46 L 50 38"
        fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
