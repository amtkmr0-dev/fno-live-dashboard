<?xml version="1.0" encoding="UTF-8"?>
<!--
  Quantra wordmark — gradient Q badge + "QUANTRA" text. For login,
  marketing surfaces, footers, anywhere we want the full lockup.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 40" aria-label="Quantra Terminal">
  <defs>
    <linearGradient id="wg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1e3a8a"/>
      <stop offset="0.55" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <g transform="translate(2 4) scale(0.5)">
    <rect width="64" height="64" rx="14" ry="14" fill="url(#wg)"/>
    <path d="M 32 14 A 14 14 0 1 1 21.5 41.5" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
    <path d="M 31 35 L 42 46 L 50 38" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="44" y="27"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-weight="800"
        font-size="20"
        letter-spacing="3"
        fill="#f1f5f9">QUANTRA</text>
</svg>
