<!DOCTYPE html>
<html lang="en" data-theme="bloomberg-pro">
<head>
<script>
  (function(){
    var t = localStorage.getItem('quantra-theme');
    if (t) document.documentElement.setAttribute('data-theme', t);
  })();
</script>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Email — QUANTRA Terminal</title>
<meta name="description" content="Verify your email address to unlock your institutional Quantra Terminal workspace.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   QUANTRA Terminal — Professional Premium Theme
   Ultra-High Fidelity Email Verification Page
   ============================================================ */

:root {
  --bg:            #050508;
  --surface:       rgba(20, 20, 27, 0.45);
  --surface-hover: rgba(30, 30, 42, 0.6);
  --border:        rgba(255, 255, 255, 0.06);
  --border-focus:  #3b82f6;
  --text:          #d1d1f0;
  --text-dim:      #7878a3;
  --text-vdim:     #4d4d73;
  --text-bright:   #f3f3ff;
  --accent:        #3b82f6;
  --accent-glow:   rgba(59, 130, 246, 0.4);
  --green:         #10b981;
  --green-glow:    rgba(16, 185, 129, 0.4);
  --red:           #ef4444;
  --font-sans:     'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono:     'JetBrains Mono', monospace;
  --radius-md:     10px;
  --radius-lg:     16px;
  --radius-xl:     24px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; -webkit-font-smoothing: antialiased; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
  position: relative;
}

/* ---- Glowing Mesh Background ---- */
.mesh-bg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  overflow: hidden;
  pointer-events: none;
}
.mesh-orb-1 {
  position: absolute;
  top: -10%;
  left: 20%;
  width: 700px;
  height: 700px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(59,130,246,0.11) 0%, transparent 65%);
  filter: blur(80px);
  animation: floatOrb 18s ease-in-out infinite alternate;
}
.mesh-orb-2 {
  position: absolute;
  bottom: -20%;
  right: 10%;
  width: 800px;
  height: 800px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(6,182,212,0.08) 0%, transparent 60%);
  filter: blur(100px);
  animation: floatOrb 24s ease-in-out infinite alternate-reverse;
}
@keyframes floatOrb {
  0% { transform: translate(0, 0) scale(1); }
  100% { transform: translate(40px, -40px) scale(1.1); }
}

/* ---- Decorative Grid ---- */
.grid-lines {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: 
    linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
  background-size: 40px 40px;
  z-index: 1;
  pointer-events: none;
}

/* ---- Main Card ---- */
.card-wrapper {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 440px;
}
.card {
  background: var(--surface);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 48px 40px;
  box-shadow: 
    0 20px 50px rgba(0, 0, 0, 0.6),
    inset 0 1px 0 rgba(255, 255, 255, 0.05);
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  transition: border-color 0.3s;
}
.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), #06b6d4);
}

/* ---- Brand Header ---- */
.brand {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-weight: 800;
  font-size: 16px;
  color: var(--text-bright);
  letter-spacing: 2px;
  margin-bottom: 36px;
  text-transform: uppercase;
}
.brand-icon {
  width: 24px;
  height: 24px;
  filter: drop-shadow(0 0 8px var(--accent));
}

/* ---- Header Content ---- */
.icon-container {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: rgba(59, 130, 246, 0.08);
  border: 1px solid rgba(59, 130, 246, 0.18);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
  font-size: 24px;
  position: relative;
  box-shadow: 0 0 20px rgba(59, 130, 246, 0.05);
}
.icon-container::after {
  content: '';
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  border: 1px solid var(--accent);
  opacity: 0.15;
  animation: pulseIcon 2s infinite;
}
@keyframes pulseIcon {
  0% { transform: scale(1); opacity: 0.25; }
  100% { transform: scale(1.3); opacity: 0; }
}

.card-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--text-bright);
  text-align: center;
  margin-bottom: 8px;
  letter-spacing: -0.3px;
}
.card-sub {
  font-size: 13px;
  color: var(--text-dim);
  text-align: center;
  margin-bottom: 32px;
  line-height: 1.6;
}
.email-display {
  color: var(--text-bright);
  font-weight: 600;
  background: rgba(255, 255, 255, 0.03);
  padding: 2px 8px;
  border-radius: 4px;
  border: 1px solid rgba(255, 255, 255, 0.05);
  font-family: var(--font-mono);
}

/* ---- OTP Input row ---- */
.otp-row {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-bottom: 28px;
}
.otp-input {
  width: 52px;
  height: 60px;
  background: rgba(10, 10, 15, 0.6);
  border: 1.5px solid rgba(255, 255, 255, 0.08);
  border-radius: var(--radius-md);
  text-align: center;
  font-size: 24px;
  font-family: var(--font-mono);
  font-weight: 700;
  color: var(--text-bright);
  outline: none;
  transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.5);
  caret-color: var(--accent);
}
.otp-input:focus {
  border-color: var(--border-focus);
  box-shadow: 
    inset 0 2px 4px rgba(0, 0, 0, 0.5),
    0 0 16px rgba(59, 130, 246, 0.35);
  background: rgba(59, 130, 246, 0.04);
}
.otp-input.filled {
  border-color: rgba(59, 130, 246, 0.45);
  background: rgba(59, 130, 246, 0.08);
  box-shadow: 
    inset 0 2px 4px rgba(0, 0, 0, 0.5),
    0 0 12px rgba(59, 130, 246, 0.15);
}
.otp-input.error {
  border-color: var(--red) !important;
  box-shadow: 0 0 16px rgba(239, 68, 68, 0.25) !important;
  animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both;
}
@keyframes shake {
  10%, 90% { transform: translate3d(-1px, 0, 0); }
  20%, 80% { transform: translate3d(2px, 0, 0); }
  30%, 50%, 70% { transform: translate3d(-3px, 0, 0); }
  40%, 60% { transform: translate3d(3px, 0, 0); }
}

/* ---- Message Box ---- */
.error-msg {
  color: var(--red);
  font-size: 12px;
  font-weight: 500;
  text-align: center;
  margin-bottom: 16px;
  min-height: 18px;
  transition: opacity 0.2s;
  letter-spacing: 0.2px;
}

/* ---- Button ---- */
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 14px 20px;
  border-radius: var(--radius-md);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
  border: none;
  font-family: inherit;
}
.btn-primary {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 4px 20px var(--accent-glow);
}
.btn-primary:hover:not(:disabled) {
  background: var(--accent-hover);
  box-shadow: 0 6px 24px rgba(59, 130, 246, 0.5);
  transform: translateY(-1px);
}
.btn-primary:active:not(:disabled) {
  transform: translateY(0);
}
.btn-primary:disabled {
  opacity: 0.45;
  cursor: not-allowed;
  box-shadow: none;
}

/* ---- Resend Layout ---- */
.resend-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 24px;
  font-size: 13px;
  color: var(--text-dim);
}
.resend-btn {
  color: var(--accent);
  background: none;
  border: none;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  padding: 0;
  transition: color 0.2s;
}
.resend-btn:hover:not(:disabled) {
  color: #60a5fa;
  text-decoration: underline;
}
.resend-btn:disabled {
  color: var(--text-vdim);
  cursor: default;
  text-decoration: none;
}
.resend-timer {
  font-variant-numeric: tabular-nums;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-vdim);
}

/* ---- Success State ---- */
.success-state {
  text-align: center;
  display: none;
}
.success-icon {
  width: 68px;
  height: 68px;
  border-radius: 50%;
  background: rgba(16, 185, 129, 0.08);
  border: 1.5px solid rgba(16, 185, 129, 0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin: 0 auto 24px;
  box-shadow: 0 0 24px var(--green-glow);
  position: relative;
}
.success-icon::after {
  content: '';
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  border: 1.5px solid var(--green);
  opacity: 0.25;
  animation: pulseIcon 2s infinite;
}
.success-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--text-bright);
  margin-bottom: 12px;
}
.success-sub {
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 32px;
  line-height: 1.6;
}
.redirect-bar {
  height: 4px;
  background: rgba(255,255,255,0.05);
  border-radius: 2px;
  overflow: hidden;
  max-width: 240px;
  margin: 0 auto;
}
.redirect-fill {
  height: 100%;
  background: var(--green);
  border-radius: 2px;
  width: 0%;
  transition: width 3s linear;
}

/* ---- Spinner ---- */
.spinner {
  width: 18px;
  height: 18px;
  border: 2px solid rgba(255,255,255,0.35);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.65s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
  <link rel="stylesheet" href="/static/css/themes.css">
</head>
<body>
<div class="mesh-bg">
  <div class="mesh-orb-1"></div>
  <div class="mesh-orb-2"></div>
</div>
<div class="grid-lines"></div>

<div class="card-wrapper">
  <div class="card">
    <div class="brand">
      <svg class="brand-icon" viewBox="0 0 64 64" fill="none">
        <defs><linearGradient id="lg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse"><stop stop-color="#3b82f6"/><stop offset="1" stop-color="#06b6d4"/></linearGradient></defs>
        <path d="M32 4C16.5 4 4 16.5 4 32s12.5 28 28 28c5.2 0 10.1-1.4 14.3-3.9L52 62l-2.1-7.7C54.6 50.1 60 41.5 60 32 60 16.5 47.5 4 32 4z" stroke="url(#lg)" stroke-width="3.5" fill="none"/>
      </svg>
      QUANTRA
    </div>

    <!-- Verify state -->
    <div id="verify-state">
      <div class="icon-container">✉️</div>
      <div class="card-title">Check your inbox</div>
      <div class="card-sub">
        We sent a 6-digit verification code to<br>
        <span class="email-display" id="emailDisplay">your email address</span>
      </div>

      <div class="otp-row" id="otpRow">
        <input class="otp-input" type="text" inputmode="numeric" maxlength="1" id="otp0" autocomplete="one-time-code">
        <input class="otp-input" type="text" inputmode="numeric" maxlength="1" id="otp1">
        <input class="otp-input" type="text" inputmode="numeric" maxlength="1" id="otp2">
        <input class="otp-input" type="text" inputmode="numeric" maxlength="1" id="otp3">
        <input class="otp-input" type="text" inputmode="numeric" maxlength="1" id="otp4">
        <input class="otp-input" type="text" inputmode="numeric" maxlength="1" id="otp5">
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <button class="btn btn-primary" id="verifyBtn" onclick="submitOTP()">
        Verify Email Address
      </button>

      <div class="resend-row">
        <span>Didn't receive the code?</span>
        <button class="resend-btn" id="resendBtn" onclick="resendOTP()">Resend</button>
        <span class="resend-timer" id="resendTimer"></span>
      </div>
    </div>

    <!-- Success state -->
    <div class="success-state" id="successState">
      <div class="success-icon">✓</div>
      <div class="success-title">Verification Complete</div>
      <div class="success-sub">Your email address was successfully verified. Redirecting to workspace…</div>
      <div class="redirect-bar"><div class="redirect-fill" id="redirectFill"></div></div>
    </div>
  </div>
</div>

<script>
// Get credentials and set parameters
var _userId = new URLSearchParams(window.location.search).get('uid') || sessionStorage.getItem('verify_uid');
var _email = new URLSearchParams(window.location.search).get('email') || sessionStorage.getItem('verify_email');
var _resendCountdown = 30;
var _resendTimer = null;

if (_email) {
  document.getElementById('emailDisplay').textContent = _email;
}

// ── CSRF POST Helper ──
function getCsrf() {
  var m = document.cookie.match(/(?:^|;\s*)quantra_csrf=([^;]*)/);
  return m ? m[1] : '';
}

function post(url, body) {
  return fetch(url, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-CSRF-Token': getCsrf()
    },
    credentials: 'same-origin',
    body: JSON.stringify(body)
  }).then(r => r.json());
}

// ── OTP input row control ──
var inputs = Array.from(document.querySelectorAll('.otp-input'));

inputs.forEach(function(inp, i) {
  inp.addEventListener('input', function(e) {
    var val = e.target.value.replace(/\D/g, '');
    e.target.value = val.slice(-1);
    if (val) {
      e.target.classList.add('filled');
      if (i < 5) inputs[i + 1].focus();
      // Auto-submit when all filled
      if (inputs.every(el => el.value)) submitOTP();
    } else {
      e.target.classList.remove('filled');
    }
    clearError();
  });

  inp.addEventListener('keydown', function(e) {
    if (e.key === 'Backspace' && !e.target.value && i > 0) {
      inputs[i - 1].focus();
      inputs[i - 1].value = '';
      inputs[i - 1].classList.remove('filled');
    }
    if (e.key === 'ArrowLeft' && i > 0) inputs[i - 1].focus();
    if (e.key === 'ArrowRight' && i < 5) inputs[i + 1].focus();
  });

  inp.addEventListener('paste', function(e) {
    e.preventDefault();
    var pasted = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').slice(0, 6);
    pasted.split('').forEach(function(ch, j) {
      if (inputs[j]) {
        inputs[j].value = ch;
        inputs[j].classList.add('filled');
      }
    });
    if (pasted.length === 6) submitOTP();
  });
});

inputs[0].focus();

function getOTP() {
  return inputs.map(i => i.value).join('');
}

function clearError() {
  document.getElementById('errorMsg').textContent = '';
  document.getElementById('errorMsg').style.color = '';
  inputs.forEach(i => i.classList.remove('error'));
}

function showError(msg) {
  document.getElementById('errorMsg').style.color = 'var(--red)';
  document.getElementById('errorMsg').textContent = msg;
  inputs.forEach(i => { i.classList.add('error'); i.classList.remove('filled'); });
  setTimeout(() => inputs.forEach(i => i.classList.remove('error')), 500);
}

function setLoading(loading) {
  var btn = document.getElementById('verifyBtn');
  if (loading) {
    btn.innerHTML = '<div class="spinner"></div> Verifying…';
    btn.disabled = true;
  } else {
    btn.innerHTML = 'Verify Email Address';
    btn.disabled = false;
  }
}

function submitOTP() {
  var otp = getOTP();
  if (otp.length !== 6) {
    showError('Please enter all 6 digits');
    return;
  }
  setLoading(true);
  clearError();

  var body = { otp: otp };
  if (_userId) body.user_id = parseInt(_userId);

  post('/api/auth/verify-email', body)
  .then(d => {
    if (d.ok) {
      showSuccess();
    } else {
      setLoading(false);
      showError(d.error || 'Invalid OTP. Please try again.');
      inputs.forEach(i => { i.value = ''; i.classList.remove('filled'); });
      inputs[0].focus();
    }
  })
  .catch(() => {
    setLoading(false);
    showError('Network error. Please try again.');
  });
}

function showSuccess() {
  document.getElementById('verify-state').style.display = 'none';
  var s = document.getElementById('successState');
  s.style.display = 'block';
  // Animate redirect bar
  setTimeout(() => {
    document.getElementById('redirectFill').style.width = '100%';
  }, 100);
  // Redirect
  setTimeout(() => {
    window.location.href = '/';
  }, 3200);
}

function startResendCountdown() {
  _resendCountdown = 30;
  var btn = document.getElementById('resendBtn');
  var timer = document.getElementById('resendTimer');
  btn.disabled = true;
  _resendTimer = setInterval(function() {
    _resendCountdown--;
    timer.textContent = '(' + _resendCountdown + 's)';
    if (_resendCountdown <= 0) {
      clearInterval(_resendTimer);
      btn.disabled = false;
      timer.textContent = '';
    }
  }, 1000);
}

function resendOTP() {
  var btn = document.getElementById('resendBtn');
  btn.disabled = true;

  var body = {};
  if (_userId) body.user_id = parseInt(_userId);

  post('/api/auth/resend-otp', body)
  .then(d => {
    if (d.ok) {
      clearError();
      var msg = document.getElementById('errorMsg');
      msg.style.color = 'var(--green)';
      msg.textContent = '✓ New OTP verification code sent!';
      setTimeout(() => {
        if (msg.textContent.includes('✓')) {
          msg.textContent = '';
        }
      }, 4000);
      startResendCountdown();
    } else {
      btn.disabled = false;
      showError(d.error || 'Failed to resend code. Try again.');
    }
  })
  .catch(() => {
    btn.disabled = false;
    showError('Network error. Please try again.');
  });
}

startResendCountdown();
</script>
</body>
</html>
