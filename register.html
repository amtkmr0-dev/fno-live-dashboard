<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantra Terminal - Create Account</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:            #09090b;
  --surface:       #18181b;
  --border:        #27272a;
  --border-focus:  #3b82f6;
  --text:          #fafafa;
  --text-dim:      #a1a1aa;
  --text-bright:   #fafafa;
  --blue:          #3b82f6;
  --blue-hover:    #2563eb;
  --green:         #10b981;
  --red:           #ef4444;
  --orange:        #f97316;
  --yellow:        #eab308;
  --radius-md:     8px;
  --radius-lg:     12px;
  --radius-xl:     16px;
  --shadow-lg:     0 8px 24px rgba(0,0,0,0.6);
  --font-sans:     'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow-x: hidden;
  padding: 20px 0;
}

/* Background grid pattern */
.bg-pattern {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  z-index: 0;
}

/* Subtle radial glow */
.bg-glow {
  position: fixed;
  top: 30%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(59,130,246,0.08) 0%, transparent 70%);
  z-index: 0;
  pointer-events: none;
}

.login-container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 420px;
  padding: 0 20px;
}

.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 36px 32px 32px;
  box-shadow: var(--shadow-lg);
}

/* Brand header */
.login-brand {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 28px;
}
.brand-name {
  font-size: 22px;
  font-weight: 700;
  color: var(--text-bright);
  letter-spacing: 0.5px;
  margin-top: 10px;
}
.brand-sub {
  font-size: 13px;
  color: var(--text-dim);
  margin-top: 4px;
  text-align: center;
}

/* Form */
.login-form { display: flex; flex-direction: column; gap: 14px; }

.field-group {
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.field-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.field-input {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 10px 12px;
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  width: 100%;
}
.field-input:focus {
  border-color: var(--border-focus);
  box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
}
.field-input::placeholder { color: var(--text-dim); opacity: 0.6; }
.field-input.error {
  border-color: var(--red);
}
.field-input.error:focus {
  box-shadow: 0 0 0 3px rgba(239,68,68,0.15);
}

/* Inline field error */
.field-error {
  font-size: 11px;
  color: var(--red);
  display: none;
  margin-top: 2px;
}
.field-error.show { display: block; }

/* Password strength indicator */
.pw-strength {
  margin-top: 4px;
  display: none;
}
.pw-strength.show { display: block; }
.pw-strength-bar {
  height: 3px;
  border-radius: 2px;
  background: var(--border);
  overflow: hidden;
  margin-bottom: 4px;
}
.pw-strength-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.3s ease, background 0.3s ease;
  width: 0%;
}
.pw-strength-label {
  font-size: 11px;
  font-weight: 600;
}
.pw-weak   { color: var(--red); }
.pw-medium { color: var(--orange); }
.pw-strong { color: var(--green); }

/* Submit button */
.btn-login {
  width: 100%;
  padding: 11px;
  background: var(--blue);
  color: #fff;
  border: none;
  border-radius: var(--radius-md);
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  margin-top: 4px;
}
.btn-login:hover { background: var(--blue-hover); }
.btn-login:active { transform: scale(0.98); }
.btn-login:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

/* Server error message */
.login-error {
  background: rgba(239,83,80,0.1);
  border: 1px solid rgba(239,83,80,0.2);
  border-radius: var(--radius-md);
  padding: 10px 14px;
  font-size: 13px;
  color: var(--red);
  display: none;
  align-items: center;
  gap: 8px;
}
.login-error.show { display: flex; }

/* Success message */
.login-success {
  background: rgba(16,185,129,0.1);
  border: 1px solid rgba(16,185,129,0.2);
  border-radius: var(--radius-md);
  padding: 10px 14px;
  font-size: 13px;
  color: var(--green);
  display: none;
  align-items: center;
  gap: 8px;
}
.login-success.show { display: flex; }

/* Footer */
.login-footer {
  text-align: center;
  margin-top: 20px;
  font-size: 12px;
  color: var(--text-dim);
}
.login-footer a {
  color: var(--blue);
  text-decoration: none;
}
.login-footer a:hover { text-decoration: underline; }

/* Loading spinner */
.btn-login .spinner {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  vertical-align: middle;
  margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

      <div class="brand-name">Create Account</div>
      <div class="brand-sub">Start your F&amp;O analytics journey</div>
    </div>

    <form class="login-form" id="registerForm" autocomplete="on" novalidate>
      <!-- Server error -->
      <div class="login-error" id="serverError">
        <span>&#x26A0;</span>
        <span id="serverErrorMsg">Registration failed</span>
      </div>

      <!-- Username -->
      <div class="field-group">
        <label class="field-label" for="username">Username <span style="color:var(--red)">*</span></label>
        <input class="field-input" type="text" id="username" name="username"
               placeholder="3-20 chars, letters/numbers/underscore"
               autocomplete="username" maxlength="20" required>
        <span class="field-error" id="err-username"></span>
      </div>

      <!-- Email -->
      <div class="field-group">
        <label class="field-label" for="email">Email <span style="color:var(--red)">*</span></label>
        <input class="field-input" type="email" id="email" name="email"
               placeholder="you@example.com"
               autocomplete="email" required>
        <span class="field-error" id="err-email"></span>
      </div>

      <!-- Display Name -->
      <div class="field-group">
        <label class="field-label" for="display_name">Display Name <span style="color:var(--text-dim);font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
        <input class="field-input" type="text" id="display_name" name="display_name"
               placeholder="How you want to be addressed"
               autocomplete="name" maxlength="50">
        <span class="field-error" id="err-display_name"></span>
      </div>

      <!-- Password -->
      <div class="field-group">
        <label class="field-label" for="password">Password <span style="color:var(--red)">*</span></label>
        <input class="field-input" type="password" id="password" name="password"
               placeholder="8+ characters"
               autocomplete="new-password" required>
        <span class="field-error" id="err-password"></span>
        <!-- Strength indicator -->
        <div class="pw-strength" id="pwStrength">
          <div class="pw-strength-bar"><div class="pw-strength-fill" id="pwFill"></div></div>
          <span class="pw-strength-label" id="pwLabel"></span>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="field-group">
        <label class="field-label" for="confirm_password">Confirm Password <span style="color:var(--red)">*</span></label>
        <input class="field-input" type="password" id="confirm_password" name="confirm_password"
               placeholder="Re-enter your password"
               autocomplete="new-password" required>
        <span class="field-error" id="err-confirm_password"></span>
      </div>

      <button type="submit" class="btn-login" id="registerBtn">Create Account</button>
    </form>

    <div class="login-footer">
      Already have an account? <a href="/login">Sign In</a>
    </div>
  </div>
</div>

<script>
(function() {
  var form      = document.getElementById('registerForm');
  var btn       = document.getElementById('registerBtn');
  var serverErr = document.getElementById('serverError');
  var serverMsg = document.getElementById('serverErrorMsg');

  /* ---- Password strength ---- */
  document.getElementById('password').addEventListener('input', function() {
    updateStrength(this.value);
  });

  function updateStrength(pw) {
    var bar    = document.getElementById('pwFill');
    var label  = document.getElementById('pwLabel');
    var wrap   = document.getElementById('pwStrength');

    if (!pw) { wrap.classList.remove('show'); return; }
    wrap.classList.add('show');

    var score = 0;
    if (pw.length >= 8)  score++;
    if (pw.length >= 12) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[a-z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;

    if (score <= 2) {
      bar.style.width   = '30%';
      bar.style.background = 'var(--red)';
      label.textContent = 'Weak';
      label.className   = 'pw-strength-label pw-weak';
    } else if (score <= 4) {
      bar.style.width   = '62%';
      bar.style.background = 'var(--orange)';
      label.textContent = 'Medium';
      label.className   = 'pw-strength-label pw-medium';
    } else {
      bar.style.width   = '100%';
      bar.style.background = 'var(--green)';
      label.textContent = 'Strong';
      label.className   = 'pw-strength-label pw-strong';
    }
  }

  /* ---- Field validation helpers ---- */
  function showFieldError(id, msg) {
    var input = document.getElementById(id);
    var errEl = document.getElementById('err-' + id);
    if (input)  input.classList.add('error');
    if (errEl) { errEl.textContent = msg; errEl.classList.add('show'); }
  }

  function clearFieldError(id) {
    var input = document.getElementById(id);
    var errEl = document.getElementById('err-' + id);
    if (input)  input.classList.remove('error');
    if (errEl) { errEl.textContent = ''; errEl.classList.remove('show'); }
  }

  function clearAll() {
    ['username','email','display_name','password','confirm_password'].forEach(clearFieldError);
    serverErr.classList.remove('show');
  }

  /* ---- Inline blur validation ---- */
  document.getElementById('username').addEventListener('blur', function() {
    validateUsername(this.value);
  });
  document.getElementById('email').addEventListener('blur', function() {
    validateEmail(this.value);
  });
  document.getElementById('confirm_password').addEventListener('input', function() {
    var pw = document.getElementById('password').value;
    if (this.value && this.value !== pw) {
      showFieldError('confirm_password', 'Passwords do not match');
    } else {
      clearFieldError('confirm_password');
    }
  });

  function validateUsername(val) {
    if (!val) { showFieldError('username', 'Username is required'); return false; }
    if (val.length < 3) { showFieldError('username', 'At least 3 characters required'); return false; }
    if (val.length > 20) { showFieldError('username', 'Maximum 20 characters'); return false; }
    if (!/^[A-Za-z0-9_]+$/.test(val)) { showFieldError('username', 'Only letters, numbers and underscore allowed'); return false; }
    clearFieldError('username');
    return true;
  }

  function validateEmail(val) {
    if (!val) { showFieldError('email', 'Email is required'); return false; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) { showFieldError('email', 'Enter a valid email address'); return false; }
    clearFieldError('email');
    return true;
  }

  /* ---- Form submit ---- */
  form.addEventListener('submit', function(e) {
    e.preventDefault();
    clearAll();

    var username        = document.getElementById('username').value.trim();
    var email           = document.getElementById('email').value.trim();
    var display_name    = document.getElementById('display_name').value.trim();
    var password        = document.getElementById('password').value;
    var confirm_password = document.getElementById('confirm_password').value;

    var valid = true;

    if (!validateUsername(username)) valid = false;
    if (!validateEmail(email))       valid = false;

    if (!password) {
      showFieldError('password', 'Password is required');
      valid = false;
    } else if (password.length < 8) {
      showFieldError('password', 'Password must be at least 8 characters');
      valid = false;
    }

    if (!confirm_password) {
      showFieldError('confirm_password', 'Please confirm your password');
      valid = false;
    } else if (password !== confirm_password) {
      showFieldError('confirm_password', 'Passwords do not match');
      valid = false;
    }

    if (!valid) return;

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Creating account...';

    var payload = { username: username, email: email, password: password };
    if (display_name) payload.display_name = display_name;

    fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      credentials: 'same-origin'
    })
    .then(function(r) {
      return r.json().then(function(d) { return { status: r.status, data: d }; });
    })
    .then(function(result) {
      if (result.data.ok) {
        window.location.href = '/login?registered=1';
      } else {
        var msg = result.data.error || 'Registration failed. Please try again.';
        serverMsg.textContent = msg;
        serverErr.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    })
    .catch(function(err) {
      serverMsg.textContent = 'Connection failed. Check if server is running.';
      serverErr.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Create Account';
    });
  });
})();
</script>
</body>
</html>
